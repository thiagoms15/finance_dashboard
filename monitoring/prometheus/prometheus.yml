global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: finance-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  - job_name: finance-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - market-data-worker:9090
